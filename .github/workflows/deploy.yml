name: Deploy Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ghcr.io/gowreeswarikarri/statuspulse:latest .

      - name: Push Docker Image
        run: |
          docker push ghcr.io/gowreeswarikarri/statuspulse:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ghcr.io/gowreeswarikarri/statuspulse:latest

            docker stop statuspulse-app || true
            docker rm statuspulse-app || true

            docker run -d \
              --name statuspulse-app \
              -p 8000:8000 \
              --env-file ~/statuspulse/.env \
              ghcr.io/gowreeswarikarri/statuspulse:latest

            docker logs statuspulse-app

            sleep 40

            curl -f http://localhost:8000/health
